<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MyPassport Smart Finder</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<img src="logo JIM.png" class="logo">

<h1>MyPassport Smart Finder (MyPSF)</h1>

<p class="subtitle">
Jabatan Imigresen Malaysia
</p>

    <div class="search-box">

    <input
        type="text"
        id="search"
        placeholder="Masukkan No Resit atau No Kad Pengenalan"
        oninput="this.value=this.value.toUpperCase()"
        onkeypress="if(event.key==='Enter'){cariPassport();}">

    <button onclick="cariPassport()">
        Cari Passport
    </button>

</div>

    <div id="result" class="result">

        Sila masukkan No Resit atau No Kad Pengenalan.

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
